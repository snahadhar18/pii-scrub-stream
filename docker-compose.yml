# Production-flavored compose stack for RedactAI.
#
# - `api`: the FastAPI gateway built from the multi-stage Dockerfile.
# - `redis`: optional broker for the scalability layer (Milestone 9). Enabled
#   via the `scale` profile so the base stack stays lean: `docker compose
#   --profile scale up`.
#
# Configuration is entirely environment-driven (RG_* variables), and host
# directories are mounted for inbound data and audit logs.

services:
  api:
    build:
      context: .
      target: runtime
    image: redactai:latest
    ports:
      - "${RG_PORT:-8000}:8000"
    environment:
      RG_ENVIRONMENT: ${RG_ENVIRONMENT:-production}
      RG_API__PORT: "8000"
      RG_PROCESSING__WORKERS: ${RG_WORKERS:-8}
      RG_OBSERVABILITY__LOG_FORMAT: json
      RG_OBSERVABILITY__AUDIT_PATH: /var/log/redactai/audit.log
    volumes:
      - ./data:/data:ro                       # inbound files to ingest
      - audit-logs:/var/log/redactai      # persisted audit trail
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8000/health').status==200 else 1)"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s

  redis:
    image: redis:7-alpine
    profiles: ["scale"]
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    restart: unless-stopped

volumes:
  audit-logs:
  redis-data:
